# This workflow installs dependencies, runs tests across multiple Node.js versions,
# builds a Docker image, and publishes the image to GitHub Container Registry after merging to main.

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tommy-cs/gha-node-ci-cd-practice

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - run: npm run build --if-present

      - run: npm test

  docker-build:
    runs-on: ubuntu-latest # This tells GitHub Actions to run this job on a temporary Ubuntu Linux machine.
    needs: build # This means "Do not start docker-build until the build job passes."

    steps: # This is the list of tasks that will run inside the docker-build job.
      - name: Checkout repository # This is the display name of the step shown in the GitHub Actions logs.
        uses: actions/checkout@v4 # This downloads your repository code into the GitHub Actions runner so Docker can access the Dockerfile and project files.

      - name: Build Docker image # This is the display name of the Docker build step in the GitHub Actions logs.
        run: docker build -t gha-node-ci-cd-practice . # This runs the Docker build command, names the image gha-node-ci-cd-practice, and uses the current repository folder as the build context.   


  docker-publish:
    runs-on: ubuntu-latest
    needs: [build, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}